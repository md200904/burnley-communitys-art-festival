<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!DOCTYPE html>
<head>
  <title>Burnley Community’s Arts Festival – Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const FONT_KEY = 'bca-site-font';
        const savedFont = localStorage.getItem(FONT_KEY);
        if (savedFont) {
            console.log(savedFont);
            document.body.style.fontFamily = savedFont;
        }
    });
    </script>
<body>

  <div class="topnav">
    <div class="nav-left">
      <a href="index.html"><img src="assets/home.png" alt="Home"></a>
      <a href="artists.html"><img src="assets/artists.png" alt="Artists"></a>
      <a href="events.html"><img src="assets/events.png" alt="Events"></a>
      <a href="contact.html"><img src="assets/contact.png" alt="Contact"></a>
      <a class="active" href="settings.html"><img src="assets/settings.png" alt="Settings"></a>
    </div>
    <div class="nav-right">
      <img src="assets/logo.png" alt="Logo">
    </div>
  </div>

  <header class="settings-header">
    <h2>Burnley Community's Art Festival</h2>
    <p>Settings</p>
  </header>

  <main class="settings-panel">
    <div class="setting-row">
      <label for="font-select">Site font</label>
      <select id="font-select">
        <option value="'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif">
          Default (Franklin Gothic)
        </option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="'Courier New', monospace">Courier New</option>
      </select>
    </div>
  </main>

  <footer>
    <p class="p3">© 2025 Max Dugdale All rights reserved</p>
  </footer>

  <script src="settings.js"></script>
</body>
</html>
